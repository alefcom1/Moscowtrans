  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;

    .error-code {
      font-family: var(--font-display, 'Inter', sans-serif);
      font-size: clamp(80px, 15vw, 160px);
      font-weight: 800;
      line-height: 1;
      background: var(--brand-gradient, linear-gradient(135deg, #783CF0, #4F8EF7));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0 0 16px;
    }
    .error-title {
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 700;
      color: var(--text-primary);
      margin: 0 0 12px;
    }
    .error-desc {
      font-size: 16px;
      color: var(--text-secondary);
      max-width: 420px;
      margin: 0 auto 40px;
      line-height: 1.6;
    }
    .error-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 56px;
    }
    .error-actions .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 24px;
      background: var(--brand-gradient, linear-gradient(135deg, #783CF0, #4F8EF7));
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      border-radius: 10px;
      text-decoration: none;
      transition: opacity .2s;
    }
    .error-actions .btn-primary:hover { opacity: .85; }
    .error-actions .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 24px;
      background: transparent;
      color: var(--text-primary);
      font-weight: 600;
      font-size: 15px;
      border-radius: 10px;
      border: 1.5px solid var(--border-subtle, rgba(120,60,240,.25));
      text-decoration: none;
      transition: border-color .2s, color .2s;
    }
    .error-actions .btn-outline:hover {
      border-color: var(--brand-violet, #783CF0);
      color: var(--brand-violet, #783CF0);
    }
    .error-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 24px;
      justify-content: center;
    }
    .error-links a {
      color: var(--text-secondary);
      font-size: 14px;
      text-decoration: none;
      transition: color .15s;
    }
    .error-links a:hover { color: var(--brand-violet, #783CF0); }
    .error-logo {
      font-family: var(--font-display, 'Inter', sans-serif);
      font-size: 22px;
      font-weight: 800;
      background: var(--brand-gradient, linear-gradient(135deg, #783CF0, #4F8EF7));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
      margin-bottom: 40px;
      display: block;
